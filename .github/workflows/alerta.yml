name: Alerta DevOps

on:
  push:
    branches:
      - main

jobs:
  enviar-alerta:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Enviar alerta a ntfy
        run: |
          curl \
            -H "Title: DevOps ITLA" \
            -d "Nuevo push realizado en la rama main" \
            https://ntfy.sh/devops-itla
